services:
  dashboard:
    build:
      context: .
      target: builder
    container_name: personal-dashboard
    command: >
      sh -c "npx prisma migrate deploy && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount the prisma dir so the dispatcher container (and host) can
      # still read dev.db at its original location on disk.
      - ./prisma:/data
      # Live source mounts — edits appear instantly without rebuilding
      - ./src:/app/src
      - ./public:/app/public
      # Keep node_modules and .next from the image, don't overwrite with host
      - /app/node_modules
      - /app/.next
    environment:
      - DATABASE_URL=file:///data/dev.db
      - NODE_ENV=development
      # Silence only the benign zlib.bytesRead deprecation warning (DEP0108)
      # emitted by an upstream dep during gzip handling. Persists across
      # rebuilds — unlike chasing dependency versions, which only masks it.
      - NODE_OPTIONS=--disable-warning=DEP0108
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      # Dispatcher is a sibling service — use Docker's internal DNS name
      - DISPATCHER_URL=http://host.docker.internal:8765
      - DISPATCHER_PROJECT=life-of-ben
      - AI_PROVIDER=claude
    env_file:
      # Loads ANTHROPIC_API_KEY, OPENAI_API_KEY, GOOGLE_* credentials
      - .env.local
    restart: unless-stopped

